version: '3.8'

services:
  fedimint-nwc:
    image: fedimint-nwc:latest
    container_name: fedimint-nwc
    restart: unless-stopped
    ports:
      - "3517:3517"
    volumes:
      - ./data:/data
    environment:
      - RUST_LOG=info,fedimint_nwc=debug
    command: 
      - server
      - --port
      - "3517"
      - --data-dir
      - /data
      - --nostr-relay
      - wss://relay.damus.io
      - --nostr-relay
      - wss://relay.primal.net