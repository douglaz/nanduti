name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Check formatting
        run: nix develop -c cargo fmt --check
      
      - name: Run clippy
        run: nix develop -c cargo clippy -- -D warnings
      
      - name: Check with all features
        run: nix develop -c cargo check --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Run tests
        run: nix develop -c cargo test --all-features
      
      - name: Run doc tests
        run: nix develop -c cargo test --doc

  build:
    name: Build
    strategy:
      matrix:
        os: [ubuntu-latest]
        target: [x86_64-unknown-linux-musl]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Build static binary
        run: nix build .#default
      
      - name: Test binary
        run: ./result/bin/fedimint-nwc --version
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedimint-nwc-${{ matrix.target }}
          path: result/bin/fedimint-nwc
          retention-days: 7

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Build Docker image
        run: |
          nix build .#docker
          docker load < result
      
      - name: Test Docker image
        run: |
          docker run --rm fedimint-nwc:latest --version
      
      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/fedimint-nwc
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          
          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          
          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          
          # Use Docker `latest` tag convention
          [ "$VERSION" == "main" ] && VERSION=latest
          [ "$VERSION" == "master" ] && VERSION=latest
          
          echo IMAGE_ID=$IMAGE_ID
          echo VERSION=$VERSION
          
          docker tag fedimint-nwc:latest $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:$VERSION
          
          # Also push commit SHA tag
          if [ "$VERSION" == "latest" ]; then
            docker tag fedimint-nwc:latest $IMAGE_ID:${{ github.sha }}
            docker push $IMAGE_ID:${{ github.sha }}
          fi

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check, test, build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fedimint-nwc-*
          merge-multiple: true
          path: ./artifacts
      
      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          cd ..
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: |
            artifacts/*
          body: |
            ## Fedimint NWC ${{ github.ref_name }}
            
            ### Installation
            
            #### Using Nix
            ```bash
            nix run github:${{ github.repository }}#${{ github.ref_name }}
            ```
            
            #### Using Docker
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/fedimint-nwc:${{ github.ref_name }}
            ```
            
            #### Binary Download
            Download the appropriate binary for your platform from the assets below.
            
            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
            
            ### Checksums
            Verify your download with the SHA256SUMS file.