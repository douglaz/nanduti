name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Validate version format
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+\.[0-9]+)?$ ]]; then
            echo "Invalid version format. Expected: v0.1.0 or v0.1.0-rc.1"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      
      - name: Check if tag exists
        run: |
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists"
            exit 1
          fi
      
      - name: Update version in Cargo.toml files
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_NUM="${VERSION#v}"  # Remove 'v' prefix
          
          # Update workspace version
          sed -i "s/^version = \".*\"/version = \"$VERSION_NUM\"/" Cargo.toml
          
          # Update all crate versions
          find . -name "Cargo.toml" -type f -exec \
            sed -i "s/^version = \"0\.[0-9]\+\.[0-9]\+\"/version = \"$VERSION_NUM\"/" {} \;
      
      - name: Create release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ inputs.version }}"
      
      - name: Create and push tag
        run: |
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin HEAD "${{ inputs.version }}"

  build-binaries:
    name: Build Binaries
    needs: prepare
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Set up QEMU for ARM builds
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            # Use QEMU user-mode emulation via Nix's binfmt support
            nix build .#default --system aarch64-linux --extra-platforms aarch64-linux
          else
            nix build .#default
          fi
      
      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp result/bin/nanduti dist/nanduti-${{ matrix.target }}
          chmod +x dist/nanduti-${{ matrix.target }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/
          retention-days: 1

  build-docker:
    name: Build Docker Images
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      
      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v8
      
      - name: Build Docker image
        run: |
          nix build .#docker
          docker load < result
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Push Docker images
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/nanduti
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=${{ needs.prepare.outputs.version }}
          VERSION_NUM="${VERSION#v}"  # Remove 'v' prefix
          
          # Tag and push with version
          docker tag nanduti:latest $IMAGE_ID:$VERSION_NUM
          docker push $IMAGE_ID:$VERSION_NUM
          
          # Also tag as latest if not a pre-release
          if [[ ! "$VERSION" =~ -(rc|beta|alpha) ]]; then
            docker tag nanduti:latest $IMAGE_ID:latest
            docker push $IMAGE_ID:latest
          fi

  create-release:
    name: Create GitHub Release
    needs: [prepare, build-binaries, build-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: ./dist
      
      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cd ..
      
      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG_BODY.md
            echo "" >> CHANGELOG_BODY.md
            git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD >> CHANGELOG_BODY.md
          else
            echo "## Initial Release" > CHANGELOG_BODY.md
            echo "" >> CHANGELOG_BODY.md
            echo "First release of Nanduti" >> CHANGELOG_BODY.md
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Nanduti ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-rc') || contains(needs.prepare.outputs.version, '-beta') || contains(needs.prepare.outputs.version, '-alpha') }}
          files: |
            dist/*
          body_path: CHANGELOG_BODY.md